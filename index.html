<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>无意义宇宙中的你 — 引力崩塌</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#050507;--bg2:#0a0a0e;
  --fg:#b8bbd0;--fg-bright:#dde0f0;--fg-dim:#4a4d62;--fg-ghost:#1a1c2a;
  --green:#4ade80;--green-glow:rgba(74,222,128,0.32);--green-dim:rgba(74,222,128,0.1);
  --cyan:#38bdf8;--cyan-dim:rgba(56,189,248,0.1);
  --serif:'Noto Serif SC','STSong','SimSun',serif;
  --mono:'Space Mono','Courier New',monospace;
}
html{font-size:16px;scroll-behavior:smooth}
body{background:var(--bg);color:var(--fg);font-family:var(--serif);min-height:100vh;overflow-x:hidden;cursor:crosshair;-webkit-font-smoothing:antialiased}

/* NOISE */
#noise{position:fixed;inset:-60%;width:220%;height:220%;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  opacity:.028;pointer-events:none;z-index:9000;
  animation:noise-s .16s steps(2) infinite;will-change:transform}
@keyframes noise-s{0%{transform:translate(0,0)}25%{transform:translate(-5px,3px)}50%{transform:translate(4px,-4px)}75%{transform:translate(-3px,5px)}100%{transform:translate(5px,-2px)}}

/* SCANLINES */
#scan{position:fixed;inset:0;background:repeating-linear-gradient(to bottom,transparent 0px,transparent 3px,rgba(0,0,0,.07) 3px,rgba(0,0,0,.07) 4px);pointer-events:none;z-index:8999}

/* WAVE */
#waveCanvas{position:fixed;bottom:0;left:0;width:100%;height:110px;z-index:100;pointer-events:none;opacity:.65}

/* PAGE GLITCH */
@keyframes pg{0%,100%{transform:none;filter:none}50%{transform:translateX(-2px) skewX(-.5deg);filter:hue-rotate(15deg)}75%{transform:translateX(2px)}}
.glitching{animation:pg .12s ease-in-out}

/* KEYFRAMES */
@keyframes fade-up{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes fade-in{from{opacity:0}to{opacity:1}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
@keyframes pulse-glow{0%,100%{text-shadow:0 0 6px var(--green-glow)}50%{text-shadow:0 0 20px var(--green-glow),0 0 40px var(--green-dim)}}
@keyframes slide-right{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
@keyframes result-in{from{opacity:0;transform:scale(.96) translateY(18px)}to{opacity:1;transform:scale(1) translateY(0)}}
@keyframes calc-fill{from{width:0}to{width:100%}}

/* SCREENS */
.screen{display:none;min-height:100vh}
.screen.active{display:flex;flex-direction:column}

/* ─── LANDING ─── */
#screen-landing{justify-content:center;align-items:flex-start;padding:clamp(3rem,10vh,7rem) clamp(1.5rem,8vw,9rem) 8rem}
.l-coord{font-family:var(--mono);font-size:.62rem;letter-spacing:.28em;color:var(--green);text-shadow:0 0 10px var(--green-glow);margin-bottom:3.5rem;opacity:0;animation:fade-up .9s ease .2s forwards}
.l-cursor{display:inline-block;animation:blink 1s step-end infinite;color:var(--green)}
.poem{max-width:560px;margin-bottom:4rem}
.pl{font-size:clamp(.95rem,1.8vw,1.15rem);font-weight:300;line-height:2.1;color:var(--fg-dim);opacity:0;transform:translateY(10px)}
.pl.bright{color:var(--fg-bright)}.pl.accent{color:var(--fg)}
.pl:nth-child(1){animation:fade-up .7s ease .5s forwards}
.pl:nth-child(2){animation:fade-up .7s ease .7s forwards}
.pl:nth-child(3){animation:fade-up .7s ease .9s forwards}
.pl:nth-child(4){animation:fade-up .7s ease 1.1s forwards}
.pl:nth-child(5){animation:fade-up .7s ease 1.3s forwards}
.pl:nth-child(6){animation:fade-up .7s ease 1.5s forwards}
.pl.gap{height:1.4rem;opacity:1;transform:none;animation:none}
.pl:nth-child(8){animation:fade-up .7s ease 1.9s forwards}
.pl:nth-child(9){animation:fade-up .7s ease 2.1s forwards}
.pl:nth-child(10){animation:fade-up .7s ease 2.3s forwards}
.pl:nth-child(11){animation:fade-up .7s ease 2.5s forwards}
.pl.gap2{height:1.4rem;opacity:1;transform:none;animation:none}
.pl:nth-child(13){animation:fade-up .7s ease 2.9s forwards}
.pl:nth-child(14){animation:fade-up .7s ease 3.1s forwards}
.pl:nth-child(15){animation:fade-up .7s ease 3.3s forwards}
.start-wrap{opacity:0;animation:fade-up .8s ease 3.7s forwards}
.start-btn{display:inline-block;font-family:var(--mono);font-size:.72rem;letter-spacing:.2em;color:var(--bg);background:var(--green);border:none;padding:1rem 2.4rem;cursor:pointer;transition:transform .2s,box-shadow .2s;clip-path:polygon(0 0,calc(100% - 12px) 0,100% 12px,100% 100%,12px 100%,0 calc(100% - 12px))}
.start-btn::before{content:'▶ ';opacity:.7}
.start-btn:hover{transform:translateY(-2px);box-shadow:0 0 32px var(--green-glow),0 0 70px var(--green-dim),0 8px 24px rgba(0,0,0,.4)}

/* ─── QUIZ ─── */
#screen-quiz{align-items:center;padding:2rem 1.5rem 9rem}
.q-header{width:100%;max-width:720px;display:flex;align-items:center;justify-content:space-between;margin-bottom:3rem;padding-top:clamp(1.5rem,5vh,3rem)}
.q-signal{font-family:var(--mono);font-size:.6rem;letter-spacing:.22em;color:var(--green);text-shadow:0 0 8px var(--green-glow)}
.q-bar{flex:1;height:1px;background:var(--fg-ghost);margin:0 1.5rem;overflow:hidden}
.q-fill{height:100%;background:var(--green);box-shadow:0 0 6px var(--green-glow);transition:width .5s cubic-bezier(.16,1,.3,1);width:0%}
.q-count{font-family:var(--mono);font-size:.6rem;letter-spacing:.15em;color:var(--fg-dim)}
.q-body{width:100%;max-width:720px}
.q-scenario-label{font-family:var(--mono);font-size:.58rem;letter-spacing:.25em;color:var(--fg-dim);margin-bottom:1.2rem;opacity:0;animation:fade-up .5s ease .05s forwards}
.q-scenario{font-size:clamp(1rem,2vw,1.18rem);font-weight:300;line-height:1.85;color:var(--fg-bright);margin-bottom:3rem;opacity:0;animation:fade-up .5s ease .1s forwards;padding-left:1.2rem;border-left:1px solid var(--fg-ghost)}
.opts{display:flex;flex-direction:column;gap:.9rem}
.opt{display:flex;align-items:flex-start;gap:1rem;background:transparent;border:1px solid var(--fg-ghost);padding:1.2rem 1.4rem;cursor:pointer;text-align:left;color:var(--fg-dim);font-family:var(--serif);font-size:clamp(.88rem,1.6vw,1rem);line-height:1.7;transition:border-color .2s,color .2s,background .2s,transform .2s;position:relative;overflow:hidden;opacity:0;clip-path:polygon(0 0,calc(100% - 8px) 0,100% 8px,100% 100%,8px 100%,0 calc(100% - 8px))}
.opt:nth-child(1){animation:slide-right .45s ease .18s forwards}
.opt:nth-child(2){animation:slide-right .45s ease .26s forwards}
.opt:nth-child(3){animation:slide-right .45s ease .34s forwards}
.opt:nth-child(4){animation:slide-right .45s ease .42s forwards}
.opt::before{content:'';position:absolute;inset:0;background:var(--green);transform:translateX(-101%);transition:transform .35s cubic-bezier(.16,1,.3,1);z-index:0;opacity:.06}
.opt:hover::before{transform:translateX(0)}
.opt:hover{border-color:var(--green);color:var(--fg-bright);transform:translateX(4px)}
.opt>*{position:relative;z-index:1}
.opt-l{font-family:var(--mono);font-size:.6rem;letter-spacing:.1em;color:var(--fg-ghost);padding-top:.25rem;min-width:1.4rem;transition:color .2s}
.opt:hover .opt-l{color:var(--green)}
.opt-t{flex:1}

/* ─── CALC ─── */
#screen-calc{justify-content:center;align-items:center;min-height:100vh;text-align:center;gap:1.5rem}
.calc-lbl{font-family:var(--mono);font-size:.65rem;letter-spacing:.3em;color:var(--green);text-shadow:0 0 10px var(--green-glow);animation:pulse-glow 1.5s ease-in-out infinite}
.calc-lines{font-family:var(--mono);font-size:.58rem;letter-spacing:.12em;color:var(--fg-dim);line-height:2;text-align:left;white-space:pre}
.calc-bar-bg{width:280px;height:1px;background:var(--fg-ghost);overflow:hidden}
.calc-bar{height:100%;width:0;background:var(--green);box-shadow:0 0 8px var(--green-glow);animation:calc-fill 2.2s cubic-bezier(.16,1,.3,1) forwards}

/* ─── RESULT ─── */
#screen-result{align-items:center;padding:3rem 1.5rem 10rem}
.r-wrap{width:100%;max-width:720px;animation:result-in .9s cubic-bezier(.16,1,.3,1) forwards}
.r-coord{font-family:var(--mono);font-size:.58rem;letter-spacing:.22em;color:var(--planet-col,var(--cyan));margin-bottom:2.5rem;padding-bottom:1rem;border-bottom:1px solid rgba(var(--planet-rgb,56,189,248),.18)}
.r-sub{font-family:var(--mono);font-size:.7rem;letter-spacing:.18em;color:var(--planet-col,var(--green));text-shadow:0 0 12px var(--planet-glow,var(--green-glow))}
.chip{font-family:var(--mono);font-size:.55rem;letter-spacing:.15em;padding:.35rem .8rem;border:1px solid rgba(var(--planet-rgb,100,100,100),.25);color:rgba(var(--planet-rgb,180,180,200),.7);clip-path:polygon(0 0,calc(100% - 5px) 0,100% 5px,100% 100%,5px 100%,0 calc(100% - 5px))}
.mystery{background:rgba(var(--planet-rgb,74,222,128),.04);border:1px solid rgba(var(--planet-rgb,74,222,128),.14);padding:1.8rem;font-size:.9rem;line-height:2.1;color:var(--fg-dim);white-space:pre-line;position:relative;margin-top:.5rem}
.mystery::before{content:'"';position:absolute;top:.8rem;left:1.2rem;font-size:2rem;color:var(--planet-col,var(--green));opacity:.35;font-family:var(--serif);line-height:1}
.dl-btn{display:block;width:100%;font-family:var(--mono);font-size:.65rem;letter-spacing:.2em;color:var(--bg);background:var(--planet-col,var(--cyan));border:none;padding:.9rem;cursor:pointer;text-align:center;transition:box-shadow .2s,transform .2s;clip-path:polygon(0 0,calc(100% - 10px) 0,100% 10px,100% 100%,10px 100%,0 calc(100% - 10px))}
.dl-btn:hover{box-shadow:0 0 24px var(--planet-glow,rgba(56,189,248,.4));transform:translateY(-1px)}
.r-header{display:flex;align-items:flex-start;gap:2rem;margin-bottom:3rem}
.r-orb{flex-shrink:0;width:100px;height:100px}
.r-orb svg{width:100%;height:100%}
.r-title{flex:1}
.r-name{font-size:clamp(1.7rem,4vw,2.5rem);font-weight:300;letter-spacing:.06em;color:var(--fg-bright);line-height:1.2;margin-bottom:.4rem}
/* merged into dynamic planet theme above */
.r-sec{border-top:1px solid rgba(var(--planet-rgb,255,255,255),.07);padding:1.8rem 0}
.r-sec-label{font-family:var(--mono);font-size:.55rem;letter-spacing:.25em;color:var(--fg-dim);margin-bottom:1rem}
.r-text{font-size:.92rem;font-weight:300;line-height:2;color:var(--fg)}
.r-text.bright{color:var(--fg-bright);font-size:.95rem;line-height:2.05}
.nasa-text{color:var(--fg-dim);font-style:italic;font-size:.88rem;line-height:1.95;border-left:1px solid rgba(var(--planet-rgb,255,255,255),.12);padding-left:1.2rem}
/* merged into dynamic planet theme above */
/* merged into dynamic planet theme above */
#radarCanvas{display:block;margin:0 auto}
.dim-grid{display:grid;grid-template-columns:1fr 1fr;gap:.8rem 2rem;margin-top:1rem}
.dim-row{display:flex;align-items:center;gap:.8rem}
.dim-lbl{font-family:var(--mono);font-size:.5rem;letter-spacing:.1em;color:var(--fg-dim);min-width:5.5rem;white-space:nowrap}
.dim-bg{flex:1;height:1px;background:var(--fg-ghost)}
.dim-fill{height:100%;background:var(--planet-col,var(--cyan));box-shadow:0 0 5px var(--planet-glow,rgba(56,189,248,.4));transition:width 1.2s cubic-bezier(.16,1,.3,1);width:0%}
.dim-val{font-family:var(--mono);font-size:.5rem;color:var(--fg-dim);min-width:1.6rem;text-align:right}
.poster-sec{border-top:1px solid var(--fg-ghost);padding:1.8rem 0}
.poster-preview{display:flex;justify-content:center;margin:1.2rem 0}
#posterPreview{max-width:240px;width:100%;border:1px solid var(--fg-ghost);display:block}
/* merged into dynamic planet theme above */
.rs-btn{display:block;width:100%;font-family:var(--mono);font-size:.6rem;letter-spacing:.2em;color:var(--fg-dim);background:transparent;border:1px solid var(--fg-ghost);padding:.85rem;cursor:pointer;text-align:center;margin-top:.8rem;transition:color .2s,border-color .2s;clip-path:polygon(0 0,calc(100% - 8px) 0,100% 8px,100% 100%,8px 100%,0 calc(100% - 8px))}
.rs-btn:hover{color:var(--fg);border-color:var(--fg-dim)}
@media(max-width:520px){.r-header{flex-direction:column;gap:1rem}.dim-grid{grid-template-columns:1fr}}
</style>
</head>
<body>

<div id="noise"></div>
<div id="scan"></div>
<canvas id="waveCanvas"></canvas>

<!-- ══════════ SCREEN 1: LANDING ══════════ -->
<section id="screen-landing" class="screen active">
  <div class="l-coord">GRAVITY COLLAPSE // SIGNAL RECEIVING... <span class="l-cursor">█</span></div>
  <div class="poem">
    <p class="pl">NASA 发现了数千颗系外行星。</p>
    <p class="pl">有些过热，有些冰冷；</p>
    <p class="pl">有些在宜居带边缘沉默运行；</p>
    <p class="pl">有些被自己的恒星缓慢吞噬；</p>
    <p class="pl">有些拥有海洋，却藏在冰层之下；</p>
    <p class="pl">有些被重新定义，却仍然完整。</p>
    <div class="pl gap"></div>
    <p class="pl accent">我们不是单一的人格标签。</p>
    <p class="pl accent">我们是温度、轨道、大气、引力</p>
    <p class="pl accent">和未知海洋组成的行星系统。</p>
    <div class="pl gap2"></div>
    <p class="pl bright">请不要选择你希望成为的自己。</p>
    <p class="pl bright">请选择你在深夜、疲惫、孤独、</p>
    <p class="pl bright">无人观看时，最接近的自己。</p>
  </div>
  <div class="start-wrap">
    <button class="start-btn" id="btnStart">以宇宙尺度，看见自己</button>
  </div>
</section>

<!-- ══════════ SCREEN 2: QUIZ ══════════ -->
<section id="screen-quiz" class="screen">
  <div class="q-header">
    <span class="q-signal" id="sigLbl">SIGNAL 01 / 30</span>
    <div class="q-bar"><div class="q-fill" id="qFill"></div></div>
    <span class="q-count" id="qCount">01 / 30</span>
  </div>
  <div class="q-body" id="qBody"></div>
</section>

<!-- ══════════ SCREEN 3: CALC ══════════ -->
<section id="screen-calc" class="screen">
  <div class="calc-lbl">ANALYZING GRAVITY FIELD...</div>
  <div class="calc-lines" id="calcLines"></div>
  <div class="calc-bar-bg"><div class="calc-bar"></div></div>
  <div class="calc-lbl" style="font-size:.52rem;color:var(--fg-dim);animation:none;margin-top:.5rem" id="calcStatus">PROCESSING...</div>
</section>

<!-- ══════════ SCREEN 4: RESULT ══════════ -->
<section id="screen-result" class="screen">
  <div class="r-wrap" id="rWrap"></div>
</section>

<canvas id="posterCanvas" style="display:none"></canvas>

<script>
/* ══════════════════════════════════
   OSCILLOSCOPE
══════════════════════════════════ */
const wc=document.getElementById('waveCanvas'),wCtx=wc.getContext('2d');
let wOff=0,tAmp=12,cAmp=12;
const bAmp=12,bFreq=.014;
function rzWave(){wc.width=window.innerWidth;wc.height=110}
window.addEventListener('resize',rzWave);rzWave();
function animWave(){
  wCtx.clearRect(0,0,wc.width,wc.height);
  cAmp+=(tAmp-cAmp)*.07;
  if(tAmp>bAmp)tAmp-=.45;if(tAmp<bAmp)tAmp=bAmp;
  wCtx.beginPath();
  wCtx.strokeStyle='rgba(74,222,128,.60)';wCtx.lineWidth=1.4;
  wCtx.shadowBlur=5;wCtx.shadowColor='#4ade80';
  const cy=wc.height/2;
  for(let x=0;x<wc.width;x++){
    const noise=(Math.random()-.5)*1.2;
    const y=cy+Math.sin(x*bFreq+wOff)*cAmp+noise;
    x===0?wCtx.moveTo(x,y):wCtx.lineTo(x,y);
  }
  wCtx.stroke();wOff+=.038;requestAnimationFrame(animWave);
}
animWave();
function triggerInterference(){
  tAmp=68;
  document.body.classList.add('glitching');
  setTimeout(()=>document.body.classList.remove('glitching'),130);
}

/* ══════════════════════════════════
   DATA: QUESTIONS
══════════════════════════════════ */
const QUESTIONS=[
  {id:'Q1',scenario:'凌晨三点，你被一阵极其规律、但毫无意义的滴水声吵醒。明天还有重要的事。',options:[
    {id:'A',text:'立即起床，找到声源彻底拧紧，然后强迫自己迅速重新进入睡眠轨道。',w:{orbital_stability:3}},
    {id:'B',text:'躺在黑暗里听着那个声音，脑海开始无边无际地漫游，甚至忘记了明天的焦虑。',w:{internal_ocean:3}},
    {id:'C',text:'戴上降噪耳机，闭上眼睛，用物理手段将自己与外界的干扰彻底隔绝。',w:{atmospheric_defense:3}},
    {id:'D',text:'感到一阵莫名的烦躁或兴奋，干脆起床不再睡了，主动打碎这无聊的睡眠节律。',w:{orbital_stability:-2,absurdity_perception:2}}
  ]},
  {id:'Q2',scenario:'避雨时，你盯着便利店里那台毫无意义、缓慢旋转的烤肠机看了整整十分钟。',options:[
    {id:'A',text:'觉得实在太无聊了，立刻拿出手机寻找其他刺激或信息来填补空白。',w:{internal_ocean:-2,orbital_stability:1}},
    {id:'B',text:'看着那缓慢的旋转，突然陷入一种庞大的、关于时间流逝的悲伤或虚无里。',w:{internal_ocean:3,absurdity_perception:2}},
    {id:'C',text:'觉得这根烤肠在某种程度上和自己很像，在无人在意的角落持续且孤独地运行着。',w:{value_alignment:2,absurdity_perception:2}},
    {id:'D',text:'开始在脑海里评判这台机器的运转效率，或者思考它为何在没客人时还要开着。',w:{orbital_stability:3}}
  ]},
  {id:'Q3',scenario:'乘坐漫长的空电梯时，旁边一个陌生人突然问你："你觉得鸟会后悔飞翔吗？"',options:[
    {id:'A',text:'认真思考了一秒，然后向他展露了你真实的、或许有些脆弱的答案。',w:{atmospheric_defense:-3}},
    {id:'B',text:'礼貌地笑了一下，给出一个滴水不漏、符合社交规范的敷衍回答。',w:{atmospheric_defense:2,orbital_stability:1}},
    {id:'C',text:'假装没听见，或者低头看手机，用绝对的沉默拒绝这种突如其来的试探。',w:{atmospheric_defense:3}},
    {id:'D',text:'毫不退缩地盯着他，用另一个更荒谬的问题反问，把局面的失控感推回去。',w:{atmospheric_defense:2,sisyphean_resistance:2}}
  ]},
  {id:'Q4',scenario:'走在极其平庸的街上，你看到地缝里卡着一块反射着奇特光芒、但毫无用处的玻璃碎片。',options:[
    {id:'A',text:'只是看了一眼便继续走。没有实际意义的东西不值得停留。',w:{stellar_attachment:-3,orbital_stability:1}},
    {id:'B',text:'把它捡回家，在接下来的几天里频繁地注视它，甚至赋予它某种隐秘的意义。',w:{stellar_attachment:3}},
    {id:'C',text:'停下来在它旁边站一会儿，确认它存在过，然后独自离开。',w:{value_alignment:2,atmospheric_defense:1}},
    {id:'D',text:'把它捡起死死攥在手心，哪怕边缘极其锋利划痛了皮肤，也觉得有一种真实感。',w:{stellar_attachment:3,sisyphean_resistance:1}}
  ]},
  {id:'Q5',scenario:'你花了很久排好一排多米诺骨牌。刚排完，一阵无名风吹来，骨牌瞬间全倒，且无人看见。',options:[
    {id:'A',text:'感到非常愤怒和挫败，觉得自己的心血和时间被彻底毁了。',w:{absurdity_perception:-2}},
    {id:'B',text:'站在原地，觉得这种"一切瞬间清零"的画面有一种滑稽的宿命感，甚至想笑。',w:{absurdity_perception:3}},
    {id:'C',text:'觉得这才是世界的常态。什么都没留下，反而让人感到一种不用向谁交代的轻松。',w:{absurdity_perception:3,stellar_attachment:-2}},
    {id:'D',text:'没什么太大的情绪波动，只是默默地蹲下来，准备重新再排一次。',w:{sisyphean_resistance:3,orbital_stability:2}}
  ]},
  {id:'Q6',scenario:'你被强制分派了一项绝对无意义的任务：把一千个回形针全部掰直。没有任何报酬和监督。',options:[
    {id:'A',text:'既然必须做，我就会建立一套极其精确的高效流程，用行动本身建立尊严。',w:{sisyphean_resistance:2,orbital_stability:2}},
    {id:'B',text:'我会把掰直的回形针编织成一个奇怪的艺术品，用我的方式嘲弄这个任务。',w:{sisyphean_resistance:3,value_alignment:2}},
    {id:'C',text:'随便敷衍了事或者直接躺平。没有意义的事情绝对不值得消耗生命。',w:{sisyphean_resistance:-3}},
    {id:'D',text:'不断加快掰直的速度，测试自己在枯燥极限下的忍耐力，把折磨变成试炼。',w:{sisyphean_resistance:3,atmospheric_defense:1}}
  ]},
  {id:'Q7',scenario:'在一个当代艺术展上，周围所有人都在对着墙上一个空无一物的相框疯狂鼓掌。',options:[
    {id:'A',text:'为了不显得突兀，你也跟着鼓掌，假装自己也看懂了什么。',w:{value_alignment:-3}},
    {id:'B',text:'感到无法忍受这种集体的虚伪，立刻转身离开这个房间。',w:{value_alignment:3}},
    {id:'C',text:'不离开也不鼓掌。你只是站在那里，在脑海里给空相框画上了属于你自己的画面。',w:{value_alignment:3,internal_ocean:2}},
    {id:'D',text:'退到最角落冷眼旁观，觉得人类的行为比那个空相框更加荒诞。',w:{value_alignment:2,absurdity_perception:2}}
  ]},
  {id:'Q8',scenario:'凌晨空无一人的十字路口，红灯还有漫长的 90 秒。',options:[
    {id:'A',text:'站在原地耐心等待，维持规则本身就是一种内心的秩序。',w:{orbital_stability:3}},
    {id:'B',text:'左右看了一眼直接走过去，没有车的时候，规则就是一串毫无意义的数字。',w:{orbital_stability:-3,value_alignment:1}},
    {id:'C',text:'看着跳动的红灯发呆，突然觉得这种被机械控制的停滞状态非常有隐喻感。',w:{absurdity_perception:3}},
    {id:'D',text:'走到马路中间又停下，享受这种随时可能破坏规则、但又没有完全破坏的边缘感。',w:{atmospheric_defense:2,absurdity_perception:2}}
  ]},
  {id:'Q9',scenario:'你的电脑突然卡死，屏幕定格在一个正在张嘴大笑的人脸静止帧上。',options:[
    {id:'A',text:'感到极其暴躁，疯狂点击鼠标，试图用暴力干预夺回控制权。',w:{orbital_stability:-2}},
    {id:'B',text:'看着那张定格的笑脸，突然觉得人类的表情一旦停止，就显得无比惊悚和虚无。',w:{absurdity_perception:3}},
    {id:'C',text:'趁机靠在椅背上闭上眼，把这次故障当成一次合理的、不用工作的借口。',w:{sisyphean_resistance:-2,value_alignment:1}},
    {id:'D',text:'冷静地按下强制重启键，接受所有未保存数据丢失的现实，准备重头再来。',w:{orbital_stability:3,sisyphean_resistance:2}}
  ]},
  {id:'Q10',scenario:'凌晨两点去洗手间，你看着镜子里的自己，持续看了三十秒。',options:[
    {id:'A',text:'觉得自己的状态很差，开始计划明天必须要早睡，恢复正常的作息。',w:{orbital_stability:3}},
    {id:'B',text:'突然觉得镜子里这张脸极其陌生，仿佛那只是一具恰好由你驾驶的碳基躯壳。',w:{absurdity_perception:3,internal_ocean:2}},
    {id:'C',text:'移开视线。你不喜欢在深夜过度审视自己，那会让你感到防御机制被削弱。',w:{atmospheric_defense:3}},
    {id:'D',text:'对着镜子做了一个极其怪异的表情，试图在这个无聊的夜晚确认自己还能控制些什么。',w:{sisyphean_resistance:2,absurdity_perception:1}}
  ]},
  {id:'Q11',scenario:'你常去的那家毫无特色、老板也很冷漠的旧面馆，今天突然贴出了"旺铺转让"。',options:[
    {id:'A',text:'觉得有些遗憾，但很快在脑海里搜索附近其他可以替代的餐厅。',w:{orbital_stability:2,stellar_attachment:-2}},
    {id:'B',text:'感到一种难以言喻的丧失感，仿佛你生活中的某个锚点突然被拔除了。',w:{stellar_attachment:3}},
    {id:'C',text:'站在紧闭的卷帘门前看了一会儿，觉得一切事物的消亡都是理所当然的。',w:{absurdity_perception:3}},
    {id:'D',text:'觉得松了一口气，这下终于有理由去尝试一条全新的回家路线了。',w:{value_alignment:2,sisyphean_resistance:1}}
  ]},
  {id:'Q12',scenario:'在连续下雨的第七天，你正走在路上，伞骨突然被一阵妖风彻底吹断了。',options:[
    {id:'A',text:'迅速把伞扔进垃圾桶，跑到最近的屋檐下，评估买新伞的成本和时间。',w:{orbital_stability:3}},
    {id:'B',text:'看着变形的伞，觉得这简直是命运对你这几天糟糕情绪的一种具象化嘲弄。',w:{absurdity_perception:2,internal_ocean:2}},
    {id:'C',text:'顶着坏掉的伞继续走，假装什么都没发生，拒绝在路人面前显得狼狈。',w:{atmospheric_defense:3}},
    {id:'D',text:'干脆把伞扔了走进雨里，享受这种彻底失控后、不用再小心翼翼防备的痛快。',w:{sisyphean_resistance:2,orbital_stability:-2}}
  ]},
  {id:'Q13',scenario:'你在尝试取消一个极其流氓的自动续费订阅，点进了第九个隐藏页面还没找到按钮。',options:[
    {id:'A',text:'截图保留证据，冷静地查找客服电话或投诉渠道，必须用规则击败规则。',w:{orbital_stability:3,sisyphean_resistance:1}},
    {id:'B',text:'感到一阵深深的疲惫，觉得现代社会的系统就是为了榨干人类精力而设计的。',w:{absurdity_perception:2,sisyphean_resistance:-2}},
    {id:'C',text:'关掉页面，选择直接注销绑定的银行卡，用切断源头的物理方式解决麻烦。',w:{atmospheric_defense:2,orbital_stability:-1}},
    {id:'D',text:'愤怒地在键盘上乱敲，甚至想黑进对方的服务器把这个系统彻底摧毁。',w:{sisyphean_resistance:3,value_alignment:2}}
  ]},
  {id:'Q14',scenario:'你的手机震动，收到了一段长达五百字、极其绝望的心事倾诉。但你确认对方发错人了。',options:[
    {id:'A',text:'礼貌地回复"您发错人了"，结束这段不属于你的社交意外。',w:{atmospheric_defense:2,orbital_stability:1}},
    {id:'B',text:'反复阅读那段文字，深深地共情了那个不知名陌生人的痛苦，甚至为此失眠。',w:{internal_ocean:3}},
    {id:'C',text:'假装没看见，直接删除对话框。你不想卷入任何来路不明的情绪黑洞。',w:{atmospheric_defense:3}},
    {id:'D',text:'顺着对方的话语，以一个虚假但温柔的身份回复他，导演一场短暂的赛博救赎。',w:{internal_ocean:2,absurdity_perception:2}}
  ]},
  {id:'Q15',scenario:'你的一副旧耳机，左耳突然没有声音了。',options:[
    {id:'A',text:'立刻下单买一副新的。无法忍受不对称和不完整的声音体验。',w:{orbital_stability:3}},
    {id:'B',text:'戴着只有右耳有声音的耳机听了一整天，觉得这种残缺的声音正好契合你的心境。',w:{internal_ocean:2,value_alignment:2}},
    {id:'C',text:'把左耳的线剪掉，当成单耳耳机继续用。只要还能听响，就不算彻底坏掉。',w:{sisyphean_resistance:3}},
    {id:'D',text:'把音量开到最大，试图用右耳的巨大轰鸣声掩盖左耳的死寂。',w:{sisyphean_resistance:2,absurdity_perception:2}}
  ]},
  {id:'Q16',scenario:'晚上一个人在家，整栋楼突然停电，陷入绝对的黑暗和安静。',options:[
    {id:'A',text:'熟练地打开手机手电筒，找出备用蜡烛或充电宝，维持基本的光源和秩序。',w:{orbital_stability:3}},
    {id:'B',text:'坐在沙发上不动，任由黑暗把自己吞没，觉得这才是宇宙原本真实的底色。',w:{absurdity_perception:3,internal_ocean:2}},
    {id:'C',text:'锁好门窗，躲进卧室的被子里。在失去视觉的安全感时，物理防御必须拉满。',w:{atmospheric_defense:3}},
    {id:'D',text:'走到阳台上看外面同样漆黑的城市，感到一种所有人都被迫停下运转的隐秘快感。',w:{absurdity_perception:2,value_alignment:2}}
  ]},
  {id:'Q17',scenario:'你走进地铁站，面前是一条长得看不见尽头、空无一人的自动扶梯。',options:[
    {id:'A',text:'站稳扶好，利用这几十秒的时间在脑子里快速过一遍今天的工作清单。',w:{orbital_stability:3}},
    {id:'B',text:'看着阶梯匀速上升，觉得人就像工业流水线上的罐头，被盲目地运往下一个地点。',w:{absurdity_perception:3}},
    {id:'C',text:'刻意贴着最边缘站立，与空荡荡的钢铁履带保持一种防备的距离。',w:{atmospheric_defense:3}},
    {id:'D',text:'放弃自动扶梯，转身跑向旁边的楼梯，用消耗体力的方式证明自己还在主动活着。',w:{sisyphean_resistance:3}}
  ]},
  {id:'Q18',scenario:'你极其用心地浇水、呵护了半年的一盆绿植，今天才发现它是极其逼真的塑料假花。',options:[
    {id:'A',text:'觉得自己的智商受到了侮辱，立刻把它扔进垃圾桶，并清理掉假花盆的位置。',w:{orbital_stability:2,stellar_attachment:-2}},
    {id:'B',text:'感到一种巨大的荒谬感。原来自己付出的爱和时间，可以倾注在一个死物上。',w:{absurdity_perception:3,internal_ocean:2}},
    {id:'C',text:'停止浇水，但把它留在原处。假装什么都没发生，反正它依然能提供视觉上的绿意。',w:{atmospheric_defense:2,sisyphean_resistance:1}},
    {id:'D',text:'突然觉得这盆假花很了不起，它用最欺骗的方式，赢得了真实的照顾。',w:{stellar_attachment:3,value_alignment:2}}
  ]},
  {id:'Q19',scenario:'回到家门口，你发现自己没带钥匙，开锁师傅说要等两个小时才能来。',options:[
    {id:'A',text:'去附近的咖啡厅打开电脑继续工作，不让这段等待时间变成纯粹的浪费。',w:{orbital_stability:3}},
    {id:'B',text:'坐在家门口的地板上，突然觉得即使只有一门之隔，进不去的家就变成了别人的世界。',w:{internal_ocean:3,absurdity_perception:2}},
    {id:'C',text:'尽量缩在楼道的死角，不想被任何路过的邻居看到自己进不去门的窘态。',w:{atmospheric_defense:3}},
    {id:'D',text:'试着用一张硬卡片或铁丝去撬门，哪怕知道不会成功，也想对抗一下这扇铁门。',w:{sisyphean_resistance:3}}
  ]},
  {id:'Q20',scenario:'你在一家网红店排了四十分钟队，快排到时才发现自己排错了，这是退货的队伍。',options:[
    {id:'A',text:'迅速离开，重新找到正确的队伍排尾，冷静接受沉没成本。',w:{orbital_stability:3}},
    {id:'B',text:'觉得这就是人生的缩影：盲目地跟随着别人，直到尽头才发现一场空。',w:{absurdity_perception:3}},
    {id:'C',text:'假装自己真的是来退货的，随便找个理由和店员交涉几句，掩饰排错队的尴尬。',w:{atmospheric_defense:3}},
    {id:'D',text:'直接离开商场不再买了。用放弃整个事件来表达对这种愚蠢规则的抗议。',w:{value_alignment:3,sisyphean_resistance:-1}}
  ]},
  {id:'Q21',scenario:'你的一枚硬币掉在地上，一路滚向了下水道的缝隙。你伸出脚去踩。',options:[
    {id:'A',text:'没踩中。你叹了口气，算清损失后头也不回地走了。',w:{orbital_stability:2,absurdity_perception:-1}},
    {id:'B',text:'没踩中。你看着它落入深渊，想到这枚硬币将在黑暗的污泥里度过几万年，感到一阵眩晕。',w:{internal_ocean:3,absurdity_perception:2}},
    {id:'C',text:'没踩中。但你立刻看向周围，确认有没有人目睹你刚才那个略显滑稽的踩踏动作。',w:{atmospheric_defense:3}},
    {id:'D',text:'踩中了。但你觉得硬币太脏，脚移开后依然眼睁睁看着它掉了下去，享受这种掌控毁灭的瞬间。',w:{absurdity_perception:3,sisyphean_resistance:2}}
  ]},
  {id:'Q22',scenario:'你新买的手机屏幕正中央，有一个极小但始终存在的坏死黑像素点。',options:[
    {id:'A',text:'马上联系售后要求退换货。无法忍受核心工具存在任何物理瑕疵。',w:{orbital_stability:3}},
    {id:'B',text:'每次看屏幕都会盯着那个黑点，觉得它像一个微型黑洞，在吸走你的注意力。',w:{internal_ocean:3}},
    {id:'C',text:'贴上一张图案繁杂的防窥膜，试图在视觉上把它隐藏起来，眼不见为净。',w:{atmospheric_defense:3}},
    {id:'D',text:'决定不换了。觉得这个独特的黑点让这台工业流水线上的手机变成了唯一属于你的残次品。',w:{value_alignment:3,absurdity_perception:2}}
  ]},
  {id:'Q23',scenario:'参加完一场漫长且需要不断假笑的社交聚会，你终于关上了自己家的房门。',options:[
    {id:'A',text:'熟练地卸妆/洗澡，按照时间表准备入睡，把白天的社交当成一份已完成的工作。',w:{orbital_stability:3}},
    {id:'B',text:'靠在门背上，感觉面部肌肉酸痛，深切地怀疑白天那个侃侃而谈的人到底是不是自己。',w:{internal_ocean:3,absurdity_perception:2}},
    {id:'C',text:'立刻拉上所有窗帘，把手机静音。你需要厚重的物理屏障来隔绝刚才耗费能量的社交场。',w:{atmospheric_defense:3}},
    {id:'D',text:'打开音响放极度嘈杂的音乐，试图用一种极端的声浪洗刷掉刚才那些虚伪的客套话。',w:{sisyphean_resistance:2,internal_ocean:2}}
  ]},
  {id:'Q24',scenario:'你打一个重要的电话，听筒里的彩铃循环播放了三遍，始终无人接听。',options:[
    {id:'A',text:'挂断，编辑一条逻辑清晰的文字信息发过去，说明意图并等待回复。',w:{orbital_stability:3}},
    {id:'B',text:'听着重复的电子音乐，觉得人与人之间想要建立连接，本身就是一件极度偶然且脆弱的事。',w:{absurdity_perception:3,internal_ocean:1}},
    {id:'C',text:'第一遍没接就挂断了。如果对方不想接，你绝对不想做一个过度打扰、失去体面的人。',w:{atmospheric_defense:3,stellar_attachment:-1}},
    {id:'D',text:'一直打，直到系统强制切断。哪怕对方觉得烦，你也要把这种压迫感传达过去。',w:{stellar_attachment:3,atmospheric_defense:-2}}
  ]},
  {id:'Q25',scenario:'办公室里，你看着碎纸机缓慢而无情地吞噬掉一份曾耗费你半个月心血的作废文件。',options:[
    {id:'A',text:'确认文件粉碎彻底后离开，心血在作废那一刻就已经归零，这是规则。',w:{orbital_stability:3}},
    {id:'B',text:'听着纸张被切碎的声音，感到一种被系统碾压的痛苦，觉得自己的生命也像这堆纸屑一样廉价。',w:{internal_ocean:3,absurdity_perception:2}},
    {id:'C',text:'把碎纸屑仔细倒掉，不留任何痕迹。你不希望别人看到你曾经为一个错误方案付出过努力。',w:{atmospheric_defense:3}},
    {id:'D',text:'觉得碎纸的过程极度解压。看着繁杂的意义被机器粗暴地解构成物理垃圾，感到十分痛快。',w:{sisyphean_resistance:3,absurdity_perception:2}}
  ]},
  {id:'Q26',scenario:'你连续几天做同一个梦：梦里你一直在一条长长的走廊里找一扇不存在的门。',options:[
    {id:'A',text:'醒来后记录下梦境，分析自己最近的压力源，并尝试在现实中寻找解决焦虑的办法。',w:{orbital_stability:3}},
    {id:'B',text:'觉得这个梦是某种深刻的潜意识隐喻，暗示你的人生永远被困在寻找意义的走廊里。',w:{absurdity_perception:3,internal_ocean:2}},
    {id:'C',text:'强迫自己在睡前不去想它，甚至吃褪黑素。你讨厌这种连梦境都无法防御的失控感。',w:{atmospheric_defense:3}},
    {id:'D',text:'在下一次做梦时，试图在梦里砸碎走廊的墙壁，强行用意识接管梦境的走向。',w:{sisyphean_resistance:3}}
  ]},
  {id:'Q27',scenario:'你试图用一截透明胶带粘住一个裂开的盒子，但胶带失去了黏性，怎么也粘不住。',options:[
    {id:'A',text:'果断扔掉废胶带，去抽屉里找一个新的，或者换用胶水，问题总有物理解决办法。',w:{orbital_stability:3}},
    {id:'B',text:'捏着失去黏性的胶带发呆，觉得这就像某些怎么努力也无法修复的关系，强行粘合只是徒劳。',w:{internal_ocean:3}},

const DIM_KEYS=['orbital_stability','internal_ocean','atmospheric_defense','stellar_attachment','absurdity_perception','sisyphean_resistance','value_alignment'];
const DIM_LABELS={'orbital_stability':'轨道稳定性','internal_ocean':'内在海洋深度','atmospheric_defense':'大气防御厚度','stellar_attachment':'恒星依附度','absurdity_perception':'荒诞感知力','sisyphean_resistance':'西西弗斯反抗力','value_alignment':'价值一致性'};

   STATE
══════════════════════════════════ */
let curQ=0,scores={};
DIM_KEYS.forEach(k=>scores[k]=0);

function computeResult(){
  let best=null,bestS=-Infinity;
  Object.entries(PLANETS).forEach(([name,p])=>{
    let s=0;DIM_KEYS.forEach(k=>s+=(p.keys[k]||0)*scores[k]);
    if(s>bestS){bestS=s;best=name;}
  });
  return best;
}

function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));

  window.scrollTo(0,0);
}

/* ══════════════════════════════════

══════════════════════════════════ */
function renderQ(idx){
  const q=QUESTIONS[idx];
  const pct=Math.round((idx/QUESTIONS.length)*100);
  document.getElementById('qFill').style.width=pct+'%';
  document.getElementById('sigLbl').textContent=`SIGNAL ${String(idx+1).padStart(2,'0')} / ${QUESTIONS.length}`;
  document.getElementById('qCount').textContent=`${String(idx+1).padStart(2,'0')} / ${QUESTIONS.length}`;
  const body=document.getElementById('qBody');
  body.innerHTML=`
    <p class="q-scenario-label">SCENARIO_${q.id} // INPUT REQUIRED</p>
    <p class="q-scenario">${q.scenario}</p>
    <div class="opts" id="opts"></div>`;
  const opts=document.getElementById('opts');
  q.options.forEach(o=>{
    const b=document.createElement('button');
    b.className='opt';
    b.innerHTML=`<span class="opt-l">${o.id}</span><span class="opt-t">${o.text}</span>`;
    b.addEventListener('click',()=>selectOpt(o));
    opts.appendChild(b);
  });
}

function selectOpt(opt){
  triggerInterference();
  Object.entries(opt.w).forEach(([k,v])=>{if(scores[k]!==undefined)scores[k]+=v;});
  curQ++;
  if(curQ>=QUESTIONS.length){finishQuiz();return;}
  const body=document.getElementById('qBody');
  body.style.cssText='opacity:0;transform:translateY(-8px);transition:opacity .25s,transform .25s';
  setTimeout(()=>{body.style.cssText='';renderQ(curQ);},280);
}

function buildSVG(p){
  const [c1,c2,c3]=p.orb;
  return `<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <radialGradient id="rg${p.id}" cx="36%" cy="30%" r="68%">
        <stop offset="0%" stop-color="${p.col}" stop-opacity=".85"/>
        <stop offset="40%" stop-color="${c1}"/>
        <stop offset="72%" stop-color="${c2}"/>
        <stop offset="100%" stop-color="${c3}"/>
      </radialGradient>
      <radialGradient id="hl${p.id}" cx="30%" cy="25%" r="45%">
        <stop offset="0%" stop-color="${p.col}" stop-opacity=".4"/>
        <stop offset="100%" stop-color="${p.col}" stop-opacity="0"/>
      </radialGradient>
      <filter id="bf${p.id}" x="-50%" y="-50%" width="200%" height="200%">
        <feGaussianBlur stdDeviation="3.5"/>
      </filter>
      <filter id="sf${p.id}" x="-20%" y="-20%" width="140%" height="140%">
        <feGaussianBlur stdDeviation="1.2"/>
      </filter>
    </defs>
    <!-- outer atmospheric glow -->
    <circle cx="50" cy="50" r="46" fill="${p.col}" opacity=".1" filter="url(#bf${p.id})"/>
    <!-- second glow ring -->
    <circle cx="50" cy="50" r="40" fill="${p.col}" opacity=".06" filter="url(#sf${p.id})"/>
    <!-- planet body -->
    <circle cx="50" cy="50" r="34" fill="url(#rg${p.id})"/>
    <!-- specular highlight -->
    <circle cx="50" cy="50" r="34" fill="url(#hl${p.id})"/>
    <!-- terminator edge darkening -->
    <circle cx="50" cy="50" r="34" fill="none" stroke="${c3}" stroke-width="1" opacity=".6"/>
    <!-- orbit ring tilted -->
    <ellipse cx="50" cy="50" rx="46" ry="10" fill="none" stroke="${p.col}" stroke-width=".6" opacity=".4"/>
    <ellipse cx="50" cy="50" rx="46" ry="10" fill="none" stroke="${p.col}" stroke-width="2" stroke-dasharray="4 40" opacity=".6"/>
    <!-- orbital dot -->
    <circle cx="96" cy="50" r="2.5" fill="${p.col}" opacity=".85"/>
    <circle cx="96" cy="50" r="4" fill="${p.col}" opacity=".2" filter="url(#sf${p.id})"/>
  </svg>`;
}

/* ══════════════════════════════════
   RADAR
══════════════════════════════════ */
function drawRadar(canvas,data,pCol){
  const ctx=canvas.getContext('2d'),W=canvas.width,H=canvas.height;
  const cx=W/2,cy=H/2,maxR=Math.min(W,H)*.38,n=data.length;
  ctx.clearRect(0,0,W,H);
  [.25,.5,.75,1].forEach(f=>{
    ctx.beginPath();
    for(let i=0;i<n;i++){const a=(Math.PI*2/n)*i-Math.PI/2;ctx.lineTo(cx+Math.cos(a)*maxR*f,cy+Math.sin(a)*maxR*f);}
    ctx.closePath();ctx.strokeStyle='rgba(255,255,255,.06)';ctx.lineWidth=1;ctx.stroke();
  });
  for(let i=0;i<n;i++){
    const a=(Math.PI*2/n)*i-Math.PI/2;
    ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(cx+Math.cos(a)*maxR,cy+Math.sin(a)*maxR);
    ctx.strokeStyle='rgba(255,255,255,.08)';ctx.lineWidth=1;ctx.stroke();
  }
  ctx.beginPath();
  data.forEach((v,i)=>{const a=(Math.PI*2/n)*i-Math.PI/2,r=v*maxR;i===0?ctx.moveTo(cx+Math.cos(a)*r,cy+Math.sin(a)*r):ctx.lineTo(cx+Math.cos(a)*r,cy+Math.sin(a)*r);});
  ctx.closePath();
  const _rgb=pCol&&pCol.startsWith('#')?[parseInt(pCol.slice(1,3),16),parseInt(pCol.slice(3,5),16),parseInt(pCol.slice(5,7),16)]:[56,189,248];
  ctx.fillStyle=`rgba(${_rgb[0]},${_rgb[1]},${_rgb[2]},.13)`;ctx.fill();
  ctx.strokeStyle=`rgba(${_rgb[0]},${_rgb[1]},${_rgb[2]},.8)`;ctx.lineWidth=1.5;
  ctx.shadowBlur=8;ctx.shadowColor=`rgba(${_rgb[0]},${_rgb[1]},${_rgb[2]},.5)`;ctx.stroke();ctx.shadowBlur=0;
  data.forEach((v,i)=>{const a=(Math.PI*2/n)*i-Math.PI/2,r=v*maxR;ctx.beginPath();ctx.arc(cx+Math.cos(a)*r,cy+Math.sin(a)*r,3.2,0,Math.PI*2);ctx.fillStyle=pCol||'#38bdf8';ctx.shadowBlur=5;ctx.shadowColor=pCol||'#38bdf8';ctx.fill();ctx.shadowBlur=0;});
  ctx.font=`9px 'Space Mono',monospace`;ctx.fillStyle='rgba(255,255,255,.3)';ctx.textAlign='center';
  DIM_KEYS.forEach((k,i)=>{
    const a=(Math.PI*2/n)*i-Math.PI/2,lr=maxR+22;
    ctx.fillText(DIM_LABELS[k].substring(0,4),cx+Math.cos(a)*lr,cy+Math.sin(a)*lr+4);
  });
}

function buildDimGrid(el,data){
  el.innerHTML=DIM_KEYS.map((k,i)=>{
    const pct=Math.round(data[i]*100);
    return `<div class="dim-row"><span class="dim-lbl">${DIM_LABELS[k]}</span><div class="dim-bg"><div class="dim-fill" style="width:0" data-p="${pct}"></div></div><span class="dim-val">${pct}</span></div>`;
  }).join('');
  setTimeout(()=>el.querySelectorAll('.dim-fill').forEach(b=>b.style.width=b.dataset.p+'%'),50);
}

/* ══════════════════════════════════
   POSTER ENGINE
══════════════════════════════════ */
let posterURL=null;

function hexRgb(hex){return[parseInt(hex.slice(1,3),16),parseInt(hex.slice(3,5),16),parseInt(hex.slice(5,7),16)].join(',')}

function wrapText(ctx,text,maxW){
  const chars=[...text],lines=[];let line='';
  chars.forEach(ch=>{if(ctx.measureText(line+ch).width>maxW&&line){lines.push(line);line=ch;}else line+=ch;});
  if(line)lines.push(line);return lines;
}

function genPoster(p,rd){
  const W=800,H=1200,c=document.getElementById('posterCanvas');
  c.width=W;c.height=H;
  const ctx=c.getContext('2d');
  // bg
  ctx.fillStyle='#07070c';ctx.fillRect(0,0,W,H);
  // noise dots
  ctx.fillStyle='rgba(255,255,255,.018)';
  for(let i=0;i<2000;i++)ctx.fillRect(Math.random()*W,Math.random()*H,1,1);
  // scanlines
  ctx.fillStyle='rgba(0,0,0,.055)';
  for(let y=0;y<H;y+=4)ctx.fillRect(0,y,W,1);
  // planet
  drawPosterPlanet(ctx,W/2,310,165,p);
  // radar overlay
  const rc=document.createElement('canvas');rc.width=220;rc.height=220;
  drawRadar(rc,rd,p.col);ctx.drawImage(rc,W/2-110,200,220,220);
  // top mono
  ctx.font=`13px 'Space Mono',monospace`;
  ctx.fillStyle=`rgba(${hexRgb(p.col)},.75)`;ctx.textAlign='left';
  ctx.shadowBlur=8;ctx.shadowColor=`rgba(${hexRgb(p.col)},.4)`;
  ctx.fillText(`GRAVITY COLLAPSE // ${p.id}`,72,86);ctx.shadowBlur=0;
  ctx.strokeStyle=`rgba(${hexRgb(p.col)},.2)`;ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(72,96);ctx.lineTo(728,96);ctx.stroke();
  // name with planet color glow
  ctx.fillStyle='#dde0f0';ctx.font=`300 50px 'Noto Serif SC',serif`;
  ctx.shadowBlur=0;ctx.fillText(p.name,72,610);
  // subtitle colored + glowing
  ctx.fillStyle=p.col;ctx.font=`italic 21px 'Noto Serif SC',serif`;
  ctx.shadowBlur=16;ctx.shadowColor=`rgba(${hexRgb(p.col)},.6)`;
  ctx.fillText(`—— ${p.sub}`,72,655);ctx.shadowBlur=0;
  // colored divider line
  ctx.strokeStyle=`rgba(${hexRgb(p.col)},.4)`;ctx.lineWidth=1;
  ctx.shadowBlur=6;ctx.shadowColor=`rgba(${hexRgb(p.col)},.4)`;
  ctx.beginPath();ctx.moveTo(72,672);ctx.lineTo(728,672);ctx.stroke();ctx.shadowBlur=0;
  // quote
  ctx.fillStyle='rgba(155,160,185,.82)';ctx.font=`300 16px 'Noto Serif SC',serif`;
  let qy=706;
  p.quote.split('\n').filter(l=>l.trim()).forEach(line=>{
    wrapText(ctx,line,640).forEach(wl=>{if(qy<1090){ctx.fillText(wl,72,qy);qy+=30;}});qy+=7;
  });
  // bottom bar
  ctx.fillStyle='rgba(255,255,255,.035)';ctx.fillRect(0,H-58,W,58);
  ctx.font=`11px 'Space Mono',monospace`;ctx.fillStyle='rgba(255,255,255,.2)';
  ctx.textAlign='left';ctx.fillText('无意义宇宙中的你',72,H-26);
  ctx.textAlign='right';ctx.fillText('GRAVITY COLLAPSE v2.5',W-72,H-26);
  // corners
  ['tl','tr','bl','br'].forEach(c2=>{
    const s=18,pp=38;
    ctx.strokeStyle=`rgba(${hexRgb(p.col)},.38)`;ctx.lineWidth=1.5;ctx.beginPath();
    if(c2==='tl'){ctx.moveTo(pp,pp+s);ctx.lineTo(pp,pp);ctx.lineTo(pp+s,pp);}
    if(c2==='tr'){ctx.moveTo(W-pp-s,pp);ctx.lineTo(W-pp,pp);ctx.lineTo(W-pp,pp+s);}
    if(c2==='bl'){ctx.moveTo(pp,H-pp-s);ctx.lineTo(pp,H-pp);ctx.lineTo(pp+s,H-pp);}
    if(c2==='br'){ctx.moveTo(W-pp-s,H-pp);ctx.lineTo(W-pp,H-pp);ctx.lineTo(W-pp,H-pp-s);}
    ctx.stroke();
  });
  posterURL=c.toDataURL('image/png');
  const prev=document.getElementById('posterPreview');
  if(prev)prev.src=posterURL;
}

function drawPosterPlanet(ctx,cx,cy,r,p){
  const [c1,c2,c3]=p.orb;
  const rgb=hexRgb(p.col);
  // outer corona glow (3 layers)
  [2.2,1.75,1.35].forEach((scale,i)=>{
    const a=[.055,.09,.13][i];
    const g=ctx.createRadialGradient(cx,cy,r*.3,cx,cy,r*scale);
    g.addColorStop(0,`rgba(${rgb},${a})`);g.addColorStop(1,'transparent');
    ctx.beginPath();ctx.arc(cx,cy,r*scale,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();
  });
  // planet body gradient - col at highlight, orb for depth
  const g2=ctx.createRadialGradient(cx-r*.32,cy-r*.28,0,cx,cy,r);
  g2.addColorStop(0,p.col);g2.addColorStop(.35,c1);g2.addColorStop(.7,c2);g2.addColorStop(1,c3);
  ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.fillStyle=g2;ctx.fill();
  // specular highlight
  const g3=ctx.createRadialGradient(cx-r*.3,cy-r*.28,0,cx-r*.1,cy-r*.1,r*.6);
  g3.addColorStop(0,`rgba(${rgb},.35)`);g3.addColorStop(.5,`rgba(${rgb},.08)`);g3.addColorStop(1,'transparent');
  ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.fillStyle=g3;ctx.fill();
  // edge rim light
  ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);
  ctx.strokeStyle=`rgba(${rgb},.25)`;ctx.lineWidth=2;ctx.stroke();
  // orbit ring
  ctx.save();ctx.translate(cx,cy);
  ctx.beginPath();
  for(let a=0;a<=Math.PI*2;a+=.04){
    const rx=r*1.45*Math.cos(a),ry=r*1.45*.22*Math.sin(a);
    a===0?ctx.moveTo(rx,ry):ctx.lineTo(rx,ry);
  }
  ctx.restore();
  ctx.strokeStyle=`rgba(${rgb},.35)`;ctx.lineWidth=1.8;
  ctx.shadowBlur=8;ctx.shadowColor=`rgba(${rgb},.5)`;ctx.stroke();ctx.shadowBlur=0;
  // dashed secondary ring
  ctx.save();ctx.translate(cx,cy);ctx.setLineDash([6,24]);
  ctx.beginPath();
  for(let a=0;a<=Math.PI*2;a+=.04){
    const rx=r*1.6*Math.cos(a),ry=r*1.6*.18*Math.sin(a);
    a===0?ctx.moveTo(rx,ry):ctx.lineTo(rx,ry);
  }
  ctx.restore();
  ctx.strokeStyle=`rgba(${rgb},.18)`;ctx.lineWidth=1;ctx.stroke();ctx.setLineDash([]);
  // orbital satellite dot
  const dotA=-Math.PI*.25;
  const dotX=cx+r*1.45*Math.cos(dotA),dotY=cy+r*1.45*.22*Math.sin(dotA);
  ctx.beginPath();ctx.arc(dotX,dotY,4,0,Math.PI*2);
  ctx.fillStyle=p.col;ctx.shadowBlur=10;ctx.shadowColor=p.col;ctx.fill();ctx.shadowBlur=0;
}

function dlPoster(){
  if(!posterURL)return;
  const a=document.createElement('a');a.download='gravity-collapse-star-map.png';a.href=posterURL;a.click();
}
